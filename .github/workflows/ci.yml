name: CI

# Both toolchain gates, mirroring the local "Develop" commands in the README.
# Every push to master and every contributor PR is checked automatically;
# workflow_dispatch stays available for manual re-runs.
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  node:
    name: Node gate · schemas + logic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test

  go:
    name: Go gate · vet + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: viewer/go.mod
          cache-dependency-path: viewer/go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
